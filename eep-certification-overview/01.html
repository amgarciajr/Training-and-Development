<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="/fonts/Calibri/index.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
        :root {
            --bg-color: #1C1C1C;
            --primary-color: #FF6200;
            --text-color: #FFFFFF;
            --heading-font: 'Calibri', sans-serif;
            --body-font: 'Calibri', sans-serif;
            --heading-base-size: 3.0rem;
            --body-base-size: 1.4rem;
            --accent1: #FF6200;
            --accent2: #CC4E00;
            --accent3: #F5F5F5;
            --bg-secondary: #2A2A2A;
            --ink-secondary: #CCCCCC;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--body-font);
            background-color: #1a1a1a;
            overflow: hidden;
            width: 1280px;
            height: 720px;
        }

        .slide-container {
            width: 1280px;
            height: 720px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-color);
        }

        /* Background layers */
        .bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .bg-overlay-1 {
            background-color: #2A1800;
            opacity: 0.7;
            clip-path: polygon(0 0, 100% 0, 100% 82%, 0% 100%);
        }

        .bg-overlay-2 {
            background-color: #0a0a0a;
            opacity: 0.5;
            clip-path: polygon(58% 0, 100% 0, 100% 100%, 42% 100%);
        }

        .bg-overlay-3 {
            position: absolute;
            top: -80px;
            left: -80px;
            width: 500px;
            height: 500px;
            background-color: #FF6200;
            border-radius: 50%;
            opacity: 0.08;
            filter: blur(90px);
            z-index: 1;
        }

        .bg-overlay-4 {
            position: absolute;
            bottom: -100px;
            right: 200px;
            width: 350px;
            height: 350px;
            background-color: #FF6200;
            border-radius: 50%;
            opacity: 0.05;
            filter: blur(70px);
            z-index: 1;
        }

        .bg-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 2;
        }

        /* Decorative right-side certification tiers */
        .cert-tiers-overlay {
            position: absolute;
            right: 60px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 5;
            display: flex;
            flex-direction: column;
            gap: 18px;
            pointer-events: none;
        }

        .cert-tier {
            display: flex;
            align-items: center;
            gap: 14px;
            opacity: 0.18;
        }

        .cert-tier-badge {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid #FF6200;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--heading-font);
            font-weight: 700;
            font-size: 1.1rem;
            color: #FF6200;
            flex-shrink: 0;
        }

        .cert-tier-label {
            font-family: var(--heading-font);
            font-size: 1.3rem;
            font-weight: 700;
            color: #FFFFFF;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* Diagonal accent line */
        .diagonal-accent {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        .diagonal-accent::before {
            content: '';
            position: absolute;
            top: 0;
            left: 52%;
            width: 5px;
            height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(255, 98, 0, 0.3), transparent);
            transform: skewX(-8deg);
        }

        /* Content wrapper */
        .content-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
            padding: 0 72px;
            color: #ffffff;
            max-width: 720px;
        }

        .accent-line {
            width: 80px;
            height: 5px;
            background-color: var(--primary-color);
            margin-bottom: 2rem;
            border-radius: 2px;
        }

        .program-tag {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: rgba(255, 98, 0, 0.15);
            border: 1px solid rgba(255, 98, 0, 0.4);
            padding: 6px 16px;
            border-radius: 4px;
            font-family: var(--heading-font);
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #FF6200;
            margin-bottom: 1.5rem;
        }

        .program-tag i {
            font-size: 0.85rem;
        }

        h1.cover-title {
            font-family: var(--heading-font);
            font-size: var(--heading-base-size);
            font-weight: 800;
            line-height: 1.05;
            text-transform: uppercase;
            letter-spacing: -1px;
            color: #FFFFFF;
            margin-bottom: 1.2rem;
            text-shadow: 2px 2px 12px rgba(0,0,0,0.4);
        }

        h1.cover-title .title-accent {
            color: var(--primary-color);
            display: block;
        }

        .subtitle-bar {
            border-left: 5px solid var(--primary-color);
            padding-left: 1.2rem;
            margin-bottom: 2.2rem;
        }

        .subtitle-text {
            font-family: var(--heading-font);
            font-size: calc(var(--heading-base-size) * 0.65);
            font-weight: 400;
            color: #CCCCCC;
            letter-spacing: 0.08em;
        }

        /* Meta info block */
        .meta-info {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 4px;
            font-family: var(--body-font);
            font-size: 0.95rem;
            color: #CCCCCC;
        }

        .meta-item i {
            color: var(--primary-color);
            font-size: 0.9rem;
        }

        .meta-item strong {
            color: #FFFFFF;
        }

        /* Bottom accent bar */
        .footer-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 5px;
            z-index: 20;
            display: flex;
        }

        .footer-seg-1 {
            flex: 3;
            background-color: var(--primary-color);
        }

        .footer-seg-2 {
            flex: 1;
            background-color: #CC4E00;
        }

        .footer-seg-3 {
            flex: 5;
            background-color: rgba(255, 98, 0, 0.25);
        }

        /* Top right label */
        .top-label {
            position: absolute;
            top: 32px;
            right: 60px;
            z-index: 10;
            font-family: var(--heading-font);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.25);
        }

        /* Version badge */
        .version-badge {
            position: absolute;
            bottom: 28px;
            right: 60px;
            z-index: 10;
            font-family: var(--heading-font);
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>
<div class="slide-container">
<!-- Background layers -->
<div class="bg-layer bg-overlay-1"></div>
<div class="bg-layer bg-overlay-2"></div>
<div class="bg-overlay-3"></div>
<div class="bg-overlay-4"></div>
<div class="bg-grid"></div>
<div class="diagonal-accent"></div>
<!-- Decorative certification tiers on right -->
<div class="cert-tiers-overlay">
<div class="cert-tier">
<div class="cert-tier-badge">L1</div>
<div class="cert-tier-label">Practitioner</div>
</div>
<div class="cert-tier">
<div class="cert-tier-badge">L2</div>
<div class="cert-tier-label">Lead</div>
</div>
<div class="cert-tier">
<div class="cert-tier-badge">L3</div>
<div class="cert-tier-label">Trainer</div>
</div>
</div>
<!-- Top label -->
<div class="top-label">Engagement Excellence Program</div>
<!-- Main content -->
<div class="content-wrapper">
<div class="accent-line"></div>
<div class="program-tag">
<i class="fas fa-certificate"></i>
                EEP · Certification Architecture
            </div>
<h1 class="cover-title">
                EEP Certification
                <span class="title-accent">Path &amp; Skills</span>
                Rubric
            </h1>
<div class="subtitle-bar">
<div class="subtitle-text">Practitioner  ·  Lead  ·  Trainer</div>
</div>
<div class="meta-info">
<div class="meta-item">
<i class="fas fa-user-tie"></i>
<span><strong>Mike Garcia</strong></span>
</div>
<div class="meta-item">
<i class="fas fa-calendar-alt"></i>
<span>June 2026</span>
</div>
<div class="meta-item">
<i class="fas fa-layer-group"></i>
<span>Version 1.0</span>
</div>
<div class="meta-item">
<i class="fas fa-building"></i>
<span>Avanade Internal</span>
</div>
</div>
</div>
<!-- Version badge -->
<div class="version-badge">v1.0 — June 6, 2026</div>
<!-- Footer bar -->
<div class="footer-bar">
<div class="footer-seg-1"></div>
<div class="footer-seg-2"></div>
<div class="footer-seg-3"></div>
</div>
</div>
</body>
</html>
