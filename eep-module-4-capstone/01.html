<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="/fonts/Calibri/index.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
        :root {
            --bg-color: #1C1C1C;
            --primary-color: #FF6200;
            --text-color: #FFFFFF;
            --heading-font: 'Calibri', sans-serif;
            --body-font: 'Calibri', sans-serif;
            --heading-base-size: 3.0rem;
            --body-base-size: 1.4rem;
            --accent1: #FF6200;
            --accent2: #CC4E00;
            --accent3: #F5F5F5;
            --bg-secondary: #2A2A2A;
            --ink-secondary: #CCCCCC;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--body-font);
            background-color: #111111;
            overflow: hidden;
            width: 1280px;
            height: 720px;
        }

        .slide-container {
            width: 1280px;
            height: 720px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-color);
        }

        /* Background layers */
        .bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .bg-overlay-1 {
            background-color: #2A1500;
            opacity: 0.7;
            clip-path: polygon(0 0, 100% 0, 100% 80%, 0% 100%);
        }

        .bg-overlay-2 {
            background-color: #000000;
            opacity: 0.45;
            clip-path: polygon(58% 0, 100% 0, 100% 100%, 42% 100%);
        }

        .bg-glow {
            position: absolute;
            top: -80px;
            left: -80px;
            width: 500px;
            height: 500px;
            background-color: var(--primary-color);
            border-radius: 50%;
            opacity: 0.08;
            filter: blur(90px);
            z-index: 2;
        }

        .bg-glow-2 {
            position: absolute;
            bottom: -60px;
            right: 200px;
            width: 350px;
            height: 350px;
            background-color: var(--accent2);
            border-radius: 50%;
            opacity: 0.06;
            filter: blur(70px);
            z-index: 2;
        }

        .bg-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 3;
        }

        /* EEP component overlay (replaces code snippet) */
        .eep-overlay {
            position: absolute;
            right: 60px;
            top: 50%;
            transform: translateY(-50%);
            font-family: var(--heading-font);
            color: rgba(255, 255, 255, 0.07);
            font-size: 1.1rem;
            font-weight: 700;
            text-align: right;
            pointer-events: none;
            z-index: 5;
            line-height: 2.2;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .eep-overlay span {
            display: block;
        }

        /* Main content */
        .content-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
            padding: 0 80px;
            color: #ffffff;
            max-width: 760px;
        }

        .accent-line {
            width: 80px;
            height: 5px;
            background-color: var(--primary-color);
            margin-bottom: 28px;
            border-radius: 2px;
        }

        .module-tag {
            display: inline-flex;
            align-items: center;
            background-color: var(--primary-color);
            color: white;
            padding: 6px 18px;
            font-family: var(--heading-font);
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 22px;
            transform: skewX(-12deg);
            width: fit-content;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .module-tag span {
            display: block;
            transform: skewX(12deg);
        }

        h1 {
            font-family: var(--heading-font);
            font-size: var(--heading-base-size);
            line-height: 1.05;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin: 0 0 6px 0;
            color: #ffffff;
            text-shadow: 2px 2px 12px rgba(0,0,0,0.4);
        }

        h1 .title-accent {
            color: var(--primary-color);
        }

        .subtitle {
            font-family: var(--heading-font);
            font-size: calc(var(--heading-base-size) * 0.65);
            font-weight: 400;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-top: 10px;
            margin-bottom: 36px;
            color: var(--ink-secondary);
            border-left: 5px solid var(--primary-color);
            padding-left: 16px;
        }

        .meta-info {
            display: flex;
            gap: 28px;
            font-size: 1.05rem;
            font-weight: 500;
            background-color: rgba(0,0,0,0.35);
            backdrop-filter: blur(10px);
            padding: 14px 24px;
            border-radius: 8px;
            width: fit-content;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--ink-secondary);
        }

        .meta-item i {
            color: var(--primary-color);
            font-size: 0.95rem;
        }

        .meta-item strong {
            color: #ffffff;
        }

        /* Bottom accent bar */
        .footer-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 6px;
            z-index: 20;
            display: flex;
        }

        .footer-seg-1 { flex: 3; background-color: var(--primary-color); }
        .footer-seg-2 { flex: 1; background-color: var(--accent2); }
        .footer-seg-3 { flex: 1; background-color: rgba(255,255,255,0.15); }
        .footer-seg-4 { flex: 5; background-color: var(--primary-color); opacity: 0.4; }

        /* Top right badge */
        .top-badge {
            position: absolute;
            top: 36px;
            right: 60px;
            z-index: 15;
            font-family: var(--heading-font);
            font-weight: 700;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            border: 1px solid rgba(255,255,255,0.15);
            padding: 6px 14px;
            border-radius: 4px;
        }

        /* Capstone badge */
        .capstone-badge {
            position: absolute;
            bottom: 36px;
            right: 60px;
            z-index: 15;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: var(--heading-font);
            font-size: 0.9rem;
            font-weight: 600;
            color: rgba(255,255,255,0.45);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .capstone-badge::before {
            content: '';
            display: block;
            width: 28px;
            height: 2px;
            background-color: var(--primary-color);
            opacity: 0.6;
        }

        /* Decorative diagonal line */
        .diag-line {
            position: absolute;
            top: 0;
            right: 420px;
            width: 2px;
            height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(255,98,0,0.15), transparent);
            z-index: 4;
            transform: skewX(-8deg);
        }

        .diag-line-2 {
            position: absolute;
            top: 0;
            right: 390px;
            width: 1px;
            height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(255,98,0,0.07), transparent);
            z-index: 4;
            transform: skewX(-8deg);
        }
    </style>
</head>
<body>
<div class="slide-container">
<!-- Background layers -->
<div class="bg-layer bg-overlay-1"></div>
<div class="bg-layer bg-overlay-2"></div>
<div class="bg-glow"></div>
<div class="bg-glow-2"></div>
<div class="bg-grid"></div>
<div class="diag-line"></div>
<div class="diag-line-2"></div>
<!-- EEP component overlay (decorative) -->
<div class="eep-overlay">
<span>EDEv4</span>
<span>CEEDS</span>
<span>CE Framework</span>
<span>Governance App</span>
</div>
<!-- Top badge -->
<div class="top-badge">EEP · Module 4 of 4</div>
<!-- Main content -->
<div class="content-wrapper">
<div class="accent-line"></div>
<div class="module-tag"><span>Capstone Component Deck</span></div>
<h1>Advanced<br/><span class="title-accent">Integration</span><br/>&amp; Mastery</h1>
<p class="subtitle">Leading Engagement Excellence Across Teams &amp; Organizations</p>
<div class="meta-info">
<div class="meta-item">
<i class="fas fa-layer-group"></i>
<span>Program: <strong>EEP</strong></span>
</div>
<div class="meta-item">
<i class="fas fa-user-tie"></i>
<span>Author: <strong>Mike Garcia</strong></span>
</div>
<div class="meta-item">
<i class="fas fa-lock"></i>
<span>Classification: <strong>Internal</strong></span>
</div>
</div>
</div>
<!-- Capstone badge bottom right -->
<div class="capstone-badge">The Final Module</div>
<!-- Footer accent bar -->
<div class="footer-bar">
<div class="footer-seg-1"></div>
<div class="footer-seg-2"></div>
<div class="footer-seg-3"></div>
<div class="footer-seg-4"></div>
</div>
</div>
</body>
</html>
