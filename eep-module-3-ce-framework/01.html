<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="/fonts/Calibri/index.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
        :root {
            --bg-color: #1C1C1C;
            --primary-color: #FF6200;
            --text-color: #FFFFFF;
            --heading-font: 'Calibri', sans-serif;
            --body-font: 'Calibri', sans-serif;
            --heading-base-size: 3.0rem;
            --body-base-size: 1.4rem;
            --accent1: #FF6200;
            --accent2: #CC4E00;
            --accent3: #F5F5F5;
            --bg-secondary: #2A2A2A;
            --ink-secondary: #CCCCCC;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--body-font);
            background-color: var(--bg-color);
            overflow: hidden;
            width: 1280px;
            height: 720px;
        }

        .slide-container {
            width: 1280px;
            height: 720px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-color);
        }

        /* Background layers */
        .bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .bg-overlay-1 {
            background-color: #2A1800;
            opacity: 0.55;
            clip-path: polygon(0 0, 100% 0, 100% 82%, 0% 100%);
        }

        .bg-overlay-2 {
            background-color: #000000;
            opacity: 0.35;
            clip-path: polygon(58% 0, 100% 0, 100% 100%, 38% 100%);
        }

        .bg-glow {
            position: absolute;
            top: -80px;
            left: -80px;
            width: 520px;
            height: 520px;
            background-color: var(--primary-color);
            border-radius: 50%;
            opacity: 0.07;
            filter: blur(90px);
            z-index: 2;
        }

        .bg-glow-right {
            position: absolute;
            bottom: -60px;
            right: 200px;
            width: 380px;
            height: 380px;
            background-color: var(--accent2);
            border-radius: 50%;
            opacity: 0.06;
            filter: blur(80px);
            z-index: 2;
        }

        .bg-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 3;
        }

        /* Decorative ghost text — CE Framework layers */
        .ghost-text {
            position: absolute;
            right: 48px;
            top: 50%;
            transform: translateY(-50%);
            font-family: var(--heading-font);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            color: rgba(255, 98, 0, 0.09);
            font-size: 1.15rem;
            text-align: right;
            pointer-events: none;
            z-index: 4;
            line-height: 2.4;
        }

        /* Orange diagonal accent bar */
        .diagonal-accent {
            position: absolute;
            top: 0;
            right: 340px;
            width: 6px;
            height: 100%;
            background: linear-gradient(to bottom, var(--primary-color), var(--accent2));
            opacity: 0.6;
            z-index: 5;
            transform: skewX(-8deg);
        }

        /* Main content */
        .content-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
            padding: 0 72px;
            color: #ffffff;
            max-width: 820px;
        }

        .program-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: rgba(255, 98, 0, 0.15);
            border: 1px solid rgba(255, 98, 0, 0.4);
            padding: 7px 18px;
            border-radius: 3px;
            margin-bottom: 28px;
            width: fit-content;
        }

        .program-badge span {
            font-family: var(--heading-font);
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--primary-color);
        }

        .program-badge i {
            color: var(--primary-color);
            font-size: 0.75rem;
        }

        .accent-line {
            width: 80px;
            height: 5px;
            background: linear-gradient(to right, var(--primary-color), var(--accent2));
            margin-bottom: 24px;
            border-radius: 2px;
        }

        h1.cover-title {
            font-family: var(--heading-font);
            font-size: var(--heading-base-size);
            font-weight: 800;
            line-height: 1.05;
            text-transform: uppercase;
            letter-spacing: -1px;
            color: #ffffff;
            margin-bottom: 10px;
            text-shadow: 2px 2px 12px rgba(0,0,0,0.4);
        }

        h1.cover-title .title-accent {
            color: var(--primary-color);
        }

        .subtitle-block {
            border-left: 4px solid var(--primary-color);
            padding-left: 20px;
            margin-top: 18px;
            margin-bottom: 36px;
        }

        .subtitle-block p {
            font-family: var(--body-font);
            font-size: 1.25rem;
            font-weight: 400;
            color: var(--ink-secondary);
            letter-spacing: 0.04em;
            line-height: 1.5;
        }

        /* Meta info row */
        .meta-row {
            display: flex;
            gap: 0;
            align-items: stretch;
            width: fit-content;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            background: rgba(0,0,0,0.35);
            backdrop-filter: blur(8px);
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 22px;
            font-family: var(--body-font);
            font-size: 0.92rem;
            font-weight: 600;
            color: #e0e0e0;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            border-right: 1px solid rgba(255,255,255,0.08);
        }

        .meta-item:last-child {
            border-right: none;
        }

        .meta-item i {
            color: var(--primary-color);
            font-size: 0.85rem;
        }

        /* Classification tag */
        .classification-tag {
            position: absolute;
            top: 36px;
            right: 52px;
            font-family: var(--body-font);
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.12);
            padding: 5px 12px;
            border-radius: 2px;
        }

        /* Module number large decorative */
        .module-number-deco {
            position: absolute;
            right: 52px;
            bottom: 60px;
            font-family: var(--heading-font);
            font-size: 9rem;
            font-weight: 900;
            color: rgba(255, 98, 0, 0.06);
            line-height: 1;
            z-index: 4;
            letter-spacing: -4px;
            pointer-events: none;
            user-select: none;
        }

        /* Bottom footer bar */
        .footer-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 5px;
            z-index: 20;
            display: flex;
        }

        .footer-seg-orange {
            flex: 3;
            background-color: var(--primary-color);
        }

        .footer-seg-dark {
            flex: 1;
            background-color: var(--accent2);
        }

        .footer-seg-light {
            flex: 5;
            background-color: rgba(255,255,255,0.08);
        }

        /* Author bottom left */
        .author-tag {
            position: absolute;
            bottom: 22px;
            left: 72px;
            font-family: var(--body-font);
            font-size: 0.78rem;
            color: rgba(255,255,255,0.35);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            z-index: 10;
        }

        .author-tag span {
            color: rgba(255,255,255,0.55);
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="slide-container">
<!-- Background layers -->
<div class="bg-layer bg-overlay-1"></div>
<div class="bg-layer bg-overlay-2"></div>
<div class="bg-glow"></div>
<div class="bg-glow-right"></div>
<div class="bg-grid"></div>
<!-- Diagonal accent -->
<div class="diagonal-accent"></div>
<!-- Ghost text: CE Framework layers -->
<div class="ghost-text">
<div>CREDIBILITY</div>
<div>RELIABILITY</div>
<div>REFERENCEABILITY</div>
<div>CE FRAMEWORK</div>
<div>CLIENT TRUST</div>
</div>
<!-- Large decorative module number -->
<div class="module-number-deco">03</div>
<!-- Classification tag -->
<div class="classification-tag">Internal</div>
<!-- Main content -->
<div class="content-wrapper">
<div class="program-badge">
<i class="fas fa-layer-group"></i>
<span>Engagement Excellence Program  ·  EEP</span>
</div>
<div class="accent-line"></div>
<h1 class="cover-title">
                The CE Framework<br/>
<span class="title-accent">Applied</span>
</h1>
<div class="subtitle-block">
<p>From Delivery to Strategic Partnership</p>
</div>
<div class="meta-row">
<div class="meta-item">
<i class="fas fa-layer-group"></i>
<span>Module 3 of 4</span>
</div>
<div class="meta-item">
<i class="fas fa-clock"></i>
<span>60 Minutes</span>
</div>
<div class="meta-item">
<i class="fas fa-user"></i>
<span>Mike Garcia</span>
</div>
</div>
</div>
<!-- Author bottom -->
<div class="author-tag">Author: <span>Mike Garcia</span></div>
<!-- Footer bar -->
<div class="footer-bar">
<div class="footer-seg-orange"></div>
<div class="footer-seg-dark"></div>
<div class="footer-seg-light"></div>
</div>
</div>
</body>
</html>
