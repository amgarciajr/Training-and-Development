<!DOCTYPE html>

<!-- Aptos font -->
<link href="https://fonts.googleapis.com/css2?family=Aptos:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
/* ---------------------------------------------------------
   ROOT VARIABLES — LIGHT MODE (C3 Lavender)
--------------------------------------------------------- */
:root {
  --bg: #F9F7FF;
  --bg-panel: #FFFFFFF2;
  --text: #1A1A1A;
  --text-muted: #555;
  --border: #DDD;
  --accent: #9B6CF9;
  --accent-glow: rgba(155,108,249,0.45);
  --nav-bg: rgba(249,247,255,0.9);
  --drawer-bg: rgba(255,255,255,0.9);
  --icon-stroke: #444;
}

/* ---------------------------------------------------------
   DARK MODE VARIABLES
--------------------------------------------------------- */
[data-theme="dark"] {
  --bg: #0B1120;
  --bg-panel: #111827;
  --text: #E5E7EB;
  --text-muted: #9CA3AF;
  --border: #1F2937;
  --accent: #886CE4;
  --accent-glow: rgba(136,108,228,0.45);
  --nav-bg: rgba(17,25,40,0.75);
  --drawer-bg: rgba(17,25,40,0.9);
  --icon-stroke: #E5E7EB;
}

/* ---------------------------------------------------------
   HIGH CONTRAST MODE VARIABLES
--------------------------------------------------------- */
[data-theme="contrast"] {
  --bg: #000;
  --bg-panel: #000;
  --text: #FFF;
  --text-muted: #FFF;
  --border: #FFF;
  --accent: #FFD700;
  --accent-glow: rgba(255,215,0,0.6);
  --nav-bg: #000;
  --drawer-bg: #000;
  --icon-stroke: #FFF;
}

/* ---------------------------------------------------------
   GLOBAL RESET & BODY
--------------------------------------------------------- */
body {
  margin: 0;
  font-family: "Aptos", "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  padding-top: 70px;
  transition: background 0.3s, color 0.3s;
}

.large-text { font-size: 1.15em; }
.extra-spacing { letter-spacing: 0.5px; line-height: 1.6; }
.underline-links a { text-decoration: underline !important; }
.reduce-motion * { animation: none !important; transition: none !important; }

/* ---------------------------------------------------------
   FLOATING NAV BAR — FIXED GRADIENT
--------------------------------------------------------- */
.navbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 60px;
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  background: linear-gradient(
    90deg,
    rgba(155,108,249,0.18) 0%,
    rgba(155,108,249,0.10) 100%
  );
  border-bottom: 1px solid rgba(155,108,249,0.25);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 22px;
  z-index: 999;
}

.nav-title { font-size: 18px; font-weight: 600; }
.nav-links { display: flex; gap: 20px; align-items: center; }

.nav-links a {
  color: var(--text);
  text-decoration: none;
  font-size: 14px;
  transition: 0.2s;
}
.nav-links a:hover {
  color: var(--accent);
  text-shadow: 0 0 6px var(--accent-glow);
}

/* Accessibility icon */
.nav-accessibility-icon {
  width: 20px; height: 20px;
  border: 2px solid var(--icon-stroke);
  border-radius: 50%;
  cursor: pointer;
  transition: 0.2s;
}
.nav-accessibility-icon:hover { border-color: var(--accent); }

/* Mobile hamburger */
.hamburger { display: none; flex-direction: column; gap: 4px; cursor: pointer; }
.hamburger div { width: 22px; height: 3px; background: var(--text); border-radius: 2px; }

.mobile-menu {
  display: none;
  position: fixed;
  top: 60px; right: 0;
  background: var(--drawer-bg);
  width: 220px; padding: 20px;
  border-left: 1px solid var(--border);
  z-index: 998;
}
.mobile-menu a {
  display: block; padding: 10px 0;
  color: var(--text); text-decoration: none;
}
.mobile-menu a:hover { color: var(--accent); }

@media (max-width: 700px) {
  .nav-links { display: none; }
  .hamburger { display: flex; }
}

/* ---------------------------------------------------------
   ICONS, GRID, DRAWERS, ACCESSIBILITY PANEL
--------------------------------------------------------- */
